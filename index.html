<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Herbarz Szlachecki - herbarz.com</title>
    <style>
        body { background-color: #b59a6d; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Times New Roman', serif; }
        .karta {
            background-color: #f3e5ab;
            padding: 40px;
            border: 2px solid #4a3728;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.3);
            text-align: center;
            width: 700px;
            position: relative;
        }
        h1 { color: #4a3728; font-size: 60px; margin: 0; font-weight: bold; }
        .subtitle { font-style: italic; color: #4a3728; margin-bottom: 25px; border-top: 1px solid #4a3728; display: inline-block; padding-top: 5px; }
        
        /* Swobodne układanie flag jako EMOJI - nie znikną! */
        .lang-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            flex-wrap: wrap; 
            margin-bottom: 20px; 
        }
        .lang-buttons span { 
            font-size: 30px; 
            cursor: pointer; 
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }
        .lang-buttons span:hover { transform: scale(1.3); }

        .search-container { display: flex; justify-content: center; }
        #szukaj { padding: 12px; width: 350px; border: 2px solid #4a3728; font-size: 18px; outline: none; }
        #przycisk { padding: 12px 25px; background: #4a3728; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 18px; }

        #wyniki { margin-top: 30px; color: #4a3728; font-weight: bold; }
        .herb-box img { max-width: 180px; border: 1px solid #4a3728; background: white; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="karta">
    <h1>HERBARZ</h1>
    <div class="subtitle">Księgi i Genealogia Rodów Szlacheckich</div>

    <div class="lang-buttons">
        <!-- Używamy emoji - są niezawodne i nie wymagają obrazków -->
        <span onclick="zmienJezyk('pl')" title="Polski">🇵🇱</span>
        <span onclick="zmienJezyk('en')" title="English">🇬🇧</span>
        <span onclick="zmienJezyk('de')" title="Deutsch">🇩🇪</span>
        <span onclick="zmienJezyk('fr')" title="Français">🇫🇷</span>
        <span onclick="zmienJezyk('es')" title="Español">🇪🇸</span>
        <span onclick="zmienJezyk('pt')" title="Português">🇵🇹</span>
        <span onclick="zmienJezyk('it')" title="Italiano">🇮🇹</span>
        <span onclick="zmienJezyk('se')" title="Svenska">🇸🇪</span>
        <span onclick="zmienJezyk('no')" title="Norsk">🇳🇴</span>
        <span onclick="zmienJezyk('he')" title="עברית">🇮🇱</span>
        <span onclick="zmienJezyk('sa')" title="العربية">🇸🇦</span>
        <span onclick="zmienJezyk('tr')" title="Türkçe">🇹🇷</span>
        <span onclick="zmienJezyk('ua')" title="Українська">🇺🇦</span>
    </div>

    <div class="search-container">
        <input id="szukaj" type="text" placeholder="Wpisz nazwisko...">
        <button id="przycisk" onclick="pobierzHerb()">Szukaj</button>
    </div>

    <div id="wyniki"></div>
</div>

<script>
    function zmienJezyk(kod) {
        // To przełącza język "tak jak dawniej"
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('lang', kod);
        window.location.href = currentUrl.toString();
    }

    async function pobierzHerb() {
        const nazwisko = document.getElementById('szukaj').value;
        const res = document.getElementById('wyniki');
        if (!nazwisko) return;
        
        res.innerHTML = "Szukam w archiwach...";
        
        // Pobieranie herbu z bazy Wikipedii
        const api = `https://wikipedia.org{nazwisko}&prop=pageimages&format=json&pithumbsize=300&origin=*`;

        try {
            const response = await fetch(api);
            const data = await response.json();
            const pages = data.query.pages;
            const id = Object.keys(pages)[0];

            if (id !== "-1" && pages[id].thumbnail) {
                res.innerHTML = `<div class="herb-box"><p>Herb ${nazwisko}</p><img src="${pages[id].thumbnail.source}"></div>`;
            } else {
                res.innerHTML = "Nie znaleziono obrazu herbu dla tego nazwiska.";
            }
        } catch (e) {
            res.innerHTML = "Błąd połączenia z bazą danych.";
        }
    }
</script>

</body>
</html>
