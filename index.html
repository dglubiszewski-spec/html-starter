<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herbarz Szlachecki - herbarz.com</title>
  <style>
    /* Styl tła i pergaminu */
    body { 
      font-family: 'Georgia', serif; 
      text-align: center; 
      margin: 0; padding: 40px 10px;
      background-color: #bc9b6a; /* Kolor drewna pod pergaminem */
      color: #2c1e11;
    }

    /* Kontener Pergaminu z postrzępionymi brzegami */
    .pergamin-page {
      background: #fdf5e6 url('https://transparenttextures.com');
      max-width: 850px;
      margin: 0 auto;
      padding: 60px 40px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      position: relative;
      /* Efekt poszarpanych krawędzi */
      clip-path: polygon(0% 2%, 4% 0%, 9% 2%, 14% 1%, 19% 3%, 24% 1%, 29% 3%, 34% 1%, 39% 4%, 44% 2%, 49% 5%, 54% 2%, 59% 4%, 64% 1%, 69% 3%, 74% 1%, 79% 3%, 84% 1%, 89% 3%, 94% 1%, 100% 3%, 98% 10%, 100% 19%, 99% 29%, 100% 39%, 98% 49%, 100% 59%, 99% 69%, 100% 79%, 98% 89%, 100% 100%, 94% 98%, 89% 100%, 84% 99%, 79% 100%, 74% 98%, 69% 100%, 64% 99%, 59% 100%, 54% 98%, 49% 100%, 44% 99%, 39% 100%, 34% 98%, 29% 100%, 24% 99%, 19% 100%, 14% 98%, 9% 100%, 4% 99%, 0% 100%, 1% 90%, 0% 80%, 2% 70%, 0% 60%, 1% 50%, 0% 40%, 2% 30%, 0% 20%, 1% 10%);
    }

    h1 { font-variant: small-caps; font-size: 3.5em; margin: 0; color: #5d4037; text-shadow: 1px 1px 0px #d4af37; }
    .subtitle { font-style: italic; color: #8d6e63; margin-bottom: 30px; border-bottom: 1px double #d4af37; display: inline-block; padding: 0 20px 10px 20px; }

    .search-box { 
      padding: 10px; background: rgba(255, 255, 255, 0.4); border: 2px solid #8d6e63; 
      border-radius: 5px; margin: 20px auto; max-width: 500px; display: flex;
    }
    #szukaj { flex: 1; border: none; background: transparent; padding: 12px; font-size: 18px; outline: none; font-style: italic; color: #2c1e11; }
    #przyciskSzukaj { background: #5d4037; color: #fdf5e6; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; }

    #wyniki { text-align: left; margin-top: 40px; }
    
    .herb-card { 
      display: flex; gap: 25px; align-items: flex-start;
      margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid #d4af37;
    }
    .herb-card img { width: 120px; height: auto; border: 1px solid #d4af37; padding: 8px; background: #fff; box-shadow: 3px 3px 10px rgba(0,0,0,0.1); }
    .herb-info h3 { margin: 0 0 15px 0; color: #5d4037; font-size: 1.6em; text-decoration: underline; }
    .herb-info p { line-height: 1.8; font-size: 1.05em; text-align: justify; margin: 0; }
  </style>
</head>
<body>

<div class="pergamin-page">
  <h1 id="tytul">Herbarz</h1>
  <p class="subtitle">Księgi i Genealogia Rodów Szlacheckich</p>

  <div class="search-box">
    <input id="szukaj" type="text" placeholder="Wpisz nazwisko...">
    <button id="przyciskSzukaj" onclick="wykonajSzukanie()">Szukaj</button>
  </div>

  <div id="wyniki"></div>
</div>

<script>
const bazaHerbow = [
  { 
    nazwisko: "Lubiszewski", herb: "Wieniawa", 
    obrazek: "https://wikimedia.org",
    opis: "Nazwisko Lubiszewski ma charakter odmiejscowy, wywodząc się najprawdopodobniej od miejscowości Lubiszewo w Wielkopolsce. Rodzina ta pieczętuje się herbem Wieniawa, który przedstawia czarną głowę żubra ze złotym pierścieniem w nozdrzach na złotym polu. Jest to jeden z najstarszych polskich herbów rycerskich, a jego legenda sięga czasów rycerza Laskarysa, który według podania gołymi rękami schwytał dzikiego żubra, co stało się symbolem niezwykłej siły, odwagi oraz niezłomności rodu w służbie Rzeczypospolitej przez pokolenia."
  },
  { 
    nazwisko: "Radziwiłł", herb: "Trąby", 
    obrazek: "https://wikimedia.org",
    opis: "Radziwiłłowie to najpotężniejszy ród magnacki Wielkiego Księstwa Litewskiego, którego wpływy i bogactwo przez stulecia dorównywały królom. Nazwisko wywodzi się od pogańskiego imienia Radziwił. Pieczętują się herbem Trąby – trzema czarnymi trąbami w złotych okuciach, ułożonymi w rosochę na błękitnej tarczy. Rodzina ta wydała licznych hetmanów, kanclerzy oraz królową Polski, Barbarę Radziwiłłównę. Ich historia to dzieje ogromnych latyfundiów, prywatnych armii i decydowania o losach całej Europy Środkowo-Wschodniej."
  },
  { 
    nazwisko: "Nowak", herb: "Nałęcz", 
    obrazek: "https://wikimedia.org",
    opis: "Nazwisko Nowak, choć powszechne, w wielu liniach posiada szlacheckie korzenie, czego dowodem jest nobilitacja wielu rodzin pod herbem Nałęcz. Herb ten przedstawia srebrną chustę ułożoną w koło i zawiązaną u dołu na czerwonym polu. Symbolizuje on jedność i braterską więź. Ród Nałęczów był jednym z najpotężniejszych klanów rycerskich we wczesnośredniowiecznej Polsce, odgrywając kluczową rolę w polityce Piastów. Historia tego nazwiska w herbarzach to opowieść o osadnictwie i dynamicznym rozwoju polskiego społeczeństwa szlacheckiego."
  }
];

function wykonajSzukanie() {
  const fraza = document.getElementById('szukaj').value.toLowerCase().trim();
  const kontener = document.getElementById('wyniki');
  kontener.innerHTML = '';
  if (fraza === '') return;
  const wyniki = bazaHerbow.filter(h => h.nazwisko.toLowerCase().includes(fraza));
  if (wyniki.length === 0) {
    kontener.innerHTML = `<p style="text-align:center;">Nie znaleziono nazwiska w dostępnych kronikach.</p>`;
    return;
  }
  wyniki.forEach(h => {
    kontener.innerHTML += `
      <div class="herb-card">
        <img src="${h.obrazek}" alt="${h.herb}">
        <div class="herb-info">
          <h3>${h.nazwisko} - herb ${h.herb}</h3>
          <p>${h.opis}</p>
        </div>
      </div>`;
  });
}

document.getElementById('szukaj').onkeyup = (e) => { if (e.key === "Enter") wykonajSzukanie(); };
</script>

</body>
</html>
