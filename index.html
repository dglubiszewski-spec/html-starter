<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Herbarz - Księgi i Genealogia Rodów Szlacheckich</title>
    <style>
        /* Stylizowanie przycisków z flagami */
        .lang-buttons {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .lang-buttons button {
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 22px;
            padding: 5px 8px;
            transition: transform 0.2s;
        }
        .lang-buttons button:hover {
            transform: scale(1.2);
            background-color: #f0f0f0;
        }
        /* Styl wyszukiwarki (zgodnie z Twoim zdjęciem) */
        .search-container {
            margin: 20px 0;
        }
        #szukaj {
            padding: 10px;
            width: 250px;
            border: 1px solid #666;
        }
        #przyciskSzukaj {
            padding: 10px 20px;
            background-color: #4a3728;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input id="szukaj" type="text" placeholder="Szukaj herbu lub nazwiska...">
        <button id="przyciskSzukaj" onclick="wykonajSzukanie()">Szukaj</button>
    </div>

    <div class="lang-buttons">
        <button onclick="zmienJezyk('pl')" title="Polski">🇵🇱</button>
        <button onclick="zmienJezyk('en')" title="English">🇬🇧</button>
        <button onclick="zmienJezyk('de')" title="Deutsch">🇩🇪</button>
        <button onclick="zmienJezyk('fr')" title="Français">🇫🇷</button>
        <button onclick="zmienJezyk('es')" title="Español">🇪🇸</button>
        <button onclick="zmienJezyk('pt')" title="Português">🇵🇹</button>
        <button onclick="zmienJezyk('it')" title="Italiano">🇮🇹</button>
        <button onclick="zmienJezyk('se')" title="Svenska">🇸🇪</button>
        <button onclick="zmienJezyk('no')" title="Norsk">🇳🇴</button>
        <button onclick="zmienJezyk('he')" title="עברית">🇮🇱</button>
        <button onclick="zmienJezyk('ar')" title="العربية">🇸🇦</button>
        <button onclick="zmienJezyk('tr')" title="Türkçe">🇹🇷</button>
        <button onclick="zmienJezyk('ru')" title="Русский">🇷🇺</button>
    </div>

    <div id="wyniki"></div>

    <script>
        function zmienJezyk(kod) {
            console.log("Zmieniono język na: " + kod);
            // Tutaj możesz dodać logikę przeładowania strony z parametrem 
            // np. window.location.search = "?lang=" + kod;
            // Lub wywołanie tłumaczenia treści przez JS.
        }

        function wykonajSzukanie() {
            const nazwisko = document.getElementById('szukaj').value;
            document.getElementById('wyniki').innerHTML = "Szukanie dla: " + nazwisko;
        }
    </script>

</body>
</html>
