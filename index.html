<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Herbarz Szlachecki - herbarz.com</title>
    <style>
        body { background-color: #b59a6d; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: serif; }
        
        /* Styl ozdobnej karty */
        .karta {
            background-color: #f3e5ab;
            padding: 50px;
            border: 2px solid #4a3728;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            min-width: 600px;
            /* Tutaj można by dodać obrazek postrzępionych brzegów w border-image */
        }

        h1 { color: #4a3728; font-size: 60px; margin: 0; text-transform: uppercase; }
        .subtitle { font-style: italic; color: #4a3728; margin-bottom: 30px; }

        /* Poprawiony kontener na 11 flag */
        .lang-buttons {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 500px;
            flex-wrap: wrap;
        }

        .lang-buttons button {
            background: none;
            border: 1px solid #4a3728;
            border-radius: 3px;
            cursor: pointer;
            font-size: 24px;
            padding: 5px;
            transition: transform 0.2s;
        }

        .lang-buttons button:hover {
            transform: scale(1.2);
            background-color: rgba(74, 55, 40, 0.1);
        }

        /* Styl wyszukiwarki */
        .search-box {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        #szukaj {
            padding: 15px;
            width: 350px;
            border: 2px solid #4a3728;
            background: #fffef0;
            font-size: 18px;
        }

        #przyciskSzukaj {
            padding: 15px 30px;
            background-color: #4a3728;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="karta">
    <h1>HERBARZ</h1>
    <div class="subtitle">Księgi i Genealogia Rodów Szlacheckich</div>

    <!-- Tutaj są Twoje przyciski - teraz jako 11 flag -->
    <div class="lang-buttons">
        <button onclick="zmienJezyk('pl')" title="Polski">🇵🇱</button>
        <button onclick="zmienJezyk('en')" title="English">🇬🇧</button>
        <button onclick="zmienJezyk('de')" title="Deutsch">🇩🇪</button>
        <button onclick="zmienJezyk('fr')" title="Français">🇫🇷</button>
        <button onclick="zmienJezyk('es')" title="Español">🇪🇸</button>
        <button onclick="zmienJezyk('it')" title="Italiano">🇮🇹</button>
        <button onclick="zmienJezyk('ru')" title="Русский">🇷🇺</button>
        <button onclick="zmienJezyk('ua')" title="Українська">🇺🇦</button>
        <button onclick="zmienJezyk('lt')" title="Lietuvių">🇱🇹</button>
        <button onclick="zmienJezyk('se')" title="Svenska">🇸🇪</button>
        <button onclick="zmienJezyk('tr')" title="Türkçe">🇹🇷</button>
    </div>

    <div class="search-box">
        <input id="szukaj" type="text" placeholder="Wpisz nazwisko...">
        <button id="przyciskSzukaj" onclick="wykonajSzukanie()">Szukaj</button>
    </div>
</div>

<script>
    function zmienJezyk(kod) {
        console.log("Wybrano język: " + kod);
        // Logika zmiany języka
    }
    function wykonajSzukanie() {
        // Logika wyszukiwania
    }
</script>

</body>
</html>
