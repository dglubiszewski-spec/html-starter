<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Herbarz Szlachecki - herbarz.com</title>
    <style>
        body { background-color: #b59a6d; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; }
        .karta { 
            background-color: #f3e5ab; padding: 50px; border: 2px solid #4a3728; 
            box-shadow: 20px 20px 40px rgba(0,0,0,0.5); text-align: center; width: 750px; 
        }
        h1 { color: #4a3728; font-size: 60px; margin: 0; letter-spacing: 4px; }
        .subtitle { font-style: italic; color: #4a3728; margin: 10px 0 30px 0; border-top: 1px solid #4a3728; display: inline-block; padding-top: 5px; }

        .lang-wrapper { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 35px; }
        .lang-btn { 
            font-size: 30px; cursor: pointer; background: none; border: 1px solid rgba(74, 55, 40, 0.2); 
            padding: 5px; border-radius: 4px; transition: 0.2s; line-height: 1;
        }
        .lang-btn:hover { transform: scale(1.2); background: rgba(74, 55, 40, 0.1); }

        .search-area { display: flex; justify-content: center; }
        #szukaj { padding: 15px; width: 350px; border: 2px solid #4a3728; background: #fffef0; font-size: 18px; outline: none; }
        #btn-szukaj { padding: 15px 30px; background: #4a3728; color: white; border: none; cursor: pointer; font-size: 18px; font-weight: bold; }

        #wyniki { margin-top: 30px; color: #4a3728; min-height: 100px; font-weight: bold; }
        .herb-item img { max-width: 250px; border: 3px double #4a3728; background: white; padding: 15px; margin-top: 10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="karta">
    <h1 id="t">HERBARZ</h1>
    <div class="subtitle" id="s">Księgi i Genealogia Rodów Szlacheckich</div>

    <div class="lang-wrapper">
        <button class="lang-btn" onclick="zmien('pl')">🇵🇱</button>
        <button class="lang-btn" onclick="zmien('en')">🇬🇧</button>
        <button class="lang-btn" onclick="zmien('de')">🇩🇪</button>
        <button class="lang-btn" onclick="zmien('fr')">🇫🇷</button>
        <button class="lang-btn" onclick="zmien('es')">🇪🇸</button>
        <button class="lang-btn" onclick="zmien('pt')">🇵🇹</button>
        <button class="lang-btn" onclick="zmien('it')">🇮🇹</button>
        <button class="lang-btn" onclick="zmien('se')">🇸🇪</button>
        <button class="lang-btn" onclick="zmien('no')">🇳🇴</button>
        <button class="lang-btn" onclick="zmien('he')">🇮🇱</button>
        <button class="lang-btn" onclick="zmien('ar')">🇸🇦</button>
        <button class="lang-btn" onclick="zmien('tr')">🇹🇷</button>
        <button class="lang-btn" onclick="zmien('ua')">🇺🇦</button>
    </div>

    <div class="search-area">
        <input id="szukaj" type="text" placeholder="Wpisz nazwisko...">
        <button id="btn-szukaj" onclick="szukajHerbu()">Szukaj</button>
    </div>

    <div id="wyniki"></div>
</div>

<script>
    const bazy = {
        'pl': {t:'HERBARZ', s:'Księgi i Genealogia Rodów Szlacheckich', p:'Wpisz nazwisko...', b:'Szukaj', m:'Szukanie...', n:'Nie znaleziono.'},
        'en': {t:'ARMORIAL', s:'Genealogy of Noble Families', p:'Enter surname...', b:'Search', m:'Searching...', n:'Not found.'},
        'de': {t:'WAPPENROLLE', s:'Genealogie der Adelsfamilien', p:'Nachname...', b:'Suche', m:'Suche...', n:'Nicht gefunden.'},
        'fr': {t:'ARMORIAL', s:'Généalogie des familles nobles', p:'Nom...', b:'Chercher', m:'Recherche...', n:'Pas trouvé.'},
        'es': {t:'ARMORIAL', s:'Genealogía de familias nobles', p:'Apellido...', b:'Buscar', m:'Buscando...', n:'No encontrado.'},
        'pt': {t:'ARMORIAL', s:'Genealogia de famílias nobres', p:'Sobrenome...', b:'Buscar', m:'Procurando...', n:'Não encontrado.'},
        'it': {t:'ARMORIALE', s:'Genealogia delle famiglie nobili', p:'Cognome...', b:'Cerca', m:'Ricerca...', n:'Non trovato.'},
        'se': {t:'VAPENBOK', s:'Adelsfamiljers genealogi', p:'Efternamn...', b:'Sök', m:'Söker...', n:'Hittades inte.'},
        'no': {t:'VÅPENBOK', s:'Adelsfamilienes genealogi', p:'Etternavn...', b:'Søk', m:'Søker...', n:'Ikke funnet.'},
        'he': {t:'ספר הרלדיקה', s:'גנאלוגיה של משפחות אצולה', p:'שם משפحة...', b:'חיפוש', m:'מחפש...', n:'לא נמצא.'},
        'ar': {t:'شعار النبالة', s:'أنساب العائلات النبيلة', p:'اسم العائلة...', b:'بحث', m:'جارٍ البحث...', n:'لم يتم العثور.'},
        'tr': {t:'ARMORIAL', s:'Soylu Ailelerin Soybilimi', p:'Soyadı...', b:'Ara', m:'Aranıyor...', n:'Bulunamadı.'},
        'ua': {t:'ГЕРБОВНИК', s:'Генеалогія шляхetських родів', p:'Прізвище...', b:'Пошук', m:'Пошук...', n:'Не знайдено.'}
    };

    let aktualnyJezyk = 'pl';

    function zmien(k) {
        aktualnyJezyk = k;
        const l = bazy[k];
        document.getElementById('t').innerText = l.t;
        document.getElementById('s').innerText = l.s;
        document.getElementById('szukaj').placeholder = l.p;
        document.getElementById('btn-szukaj').innerText = l.b;
    }

    async function szukajHerbu() {
        const q = document.getElementById('szukaj').value.trim();
        const res = document.getElementById('wyniki');
        const l = bazy[aktualnyJezyk];
        if(!q) return;

        res.innerHTML = `<em>${l.m}</em>`;
        const nazwa = q.charAt(0).toUpperCase() + q.slice(1);

        // API Wikipedii z poprawionymi parametrami
        const api = `https://wikipedia.org{nazwa}&prop=pageimages&format=json&pithumbsize=500&origin=*`;

        try {
            const r = await fetch(api);
            if (!r.ok) throw new Error();
            const d = await r.json();
            const p = d.query.pages;
            const id = Object.keys(p)[0];

            if (id !== "-1" && p[id].thumbnail) {
                res.innerHTML = `<div class="herb-item"><h3>${nazwa}</h3><img src="${p[id].thumbnail.source}"></div>`;
            } else {
                res.innerHTML = `${l.n} (${nazwa})`;
            }
        } catch (e) {
            res.innerHTML = "Błąd połączenia. Spróbuj wpisać nazwę herbu (np. Leliwa).";
        }
    }
</script>
</body>
</html>
