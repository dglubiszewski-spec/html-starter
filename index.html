<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herbarz Szlachecki - herbarz.com</title>
    <style>         body { 
            background-color: #b59a6d; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Georgia', serif; 
        }

        /* Styl karty - efekt starego papieru */
        .karta { 
            background: #f3e5ab;
            background-image: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.05) 100%);
            padding: 50px; 
            border: 2px solid #4a3728; 
            box-shadow: 20px 20px 40px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 750px; 
            border-radius: 4px;
            position: relative;
        }

        h1 { color: #4a3728; font-size: 60px; margin: 0; letter-spacing: 4px; font-weight: bold; }
        .subtitle { font-style: italic; color: #4a3728; margin: 10px 0 30px 0; border-top: 1px solid #4a3728; display: inline-block; padding-top: 5px; font-size: 18px; }

        /* Przyciski flag - dodany cień i efekt powiększenia */
        .lang-wrapper { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 35px; }
        .lang-btn { 
            font-size: 32px; cursor: pointer; background: none; border: none; 
            transition: 0.2s; outline: none; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }
        .lang-btn:hover { transform: scale(1.3); }

        /* Wyszukiwarka pasująca do stylu */
        .search-area { display: flex; justify-content: center; }
        #szukaj { 
            padding: 15px; width: 350px; border: 2px solid #4a3728; background: #fffef0; 
            font-size: 18px; outline: none; border-radius: 4px 0 0 4px; 
        }
        #btn-szukaj { 
            padding: 15px 30px; background: #4a3728; color: white; border: none; 
            cursor: pointer; font-size: 18px; font-weight: bold; border-radius: 0 4px 4px 0;
        }
        #btn-szukaj:hover { background: #634a36; }

        /* Styl wyników */
        #wyniki { margin-top: 30px; color: #4a3728; min-height: 120px; font-weight: bold; font-size: 20px; }
        .herb-item img { 
            max-width: 280px; border: 4px double #4a3728; background: white; 
            padding: 15px; margin: 15px 0; box-shadow: 10px 10px 20px rgba(0,0,0,0.2); 
        }
        .source-info { 
            font-size: 14px; font-weight: normal; margin-top: 20px; 
            border-top: 1px dashed #4a3728; padding-top: 10px; color: #555; 
        }

         </style>
</head>
<body>

<div class="karta">
    <h1 id="t">HERBARZ</h1>
    <div id="s" class="subtitle">Księgi i Genealogia Rodów Szlacheckich</div>

    <div class="lang-wrapper">
        <button class="lang-btn" onclick="zmien('pl')">🇵🇱</button>
        <button class="lang-btn" onclick="zmien('en')">🇬🇧</button>
        <button class="lang-btn" onclick="zmien('de')">🇩🇪</button>
        <button class="lang-btn" onclick="zmien('fr')">🇫🇷</button>
        <button class="lang-btn" onclick="zmien('es')">🇪🇸</button>
        <button class="lang-btn" onclick="zmien('pt')">🇵🇹</button>
        <button class="lang-btn" onclick="zmien('it')">🇮🇹</button>
        <button class="lang-btn" onclick="zmien('se')">🇸🇪</button>
        <button class="lang-btn" onclick="zmien('no')">🇳🇴</button>
        <button class="lang-btn" onclick="zmien('he')">🇮🇱</button>
        <button class="lang-btn" onclick="zmien('ar')">🇸🇦</button>
        <button class="lang-btn" onclick="zmien('tr')">🇹🇷</button>
        <button class="lang-btn" onclick="zmien('ua')">🇺🇦</button>
    </div>

    <div class="search-area">
        <input id="szukaj" type="text" placeholder="Wpisz nazwisko...">
        <button id="btn-szukaj" onclick="herbarzStart()">Szukaj</button>
    </div>

    <div id="wyniki"></div>
</div>

<script>
    const bazy = {
        'pl': {t:'HERBARZ', s:'Księgi i Genealogia Rodów Szlacheckich', p:'Wpisz nazwisko...', b:'Szukaj', m:'Szukanie...', r:'Herb: ', z:'Źródło: '},
        'en': {t:'ARMORIAL', s:'Genealogy of Noble Families', p:'Enter surname...', b:'Search', m:'Searching...', r:'Coat: ', z:'Source: '},
        'de': {t:'WAPPENROLLE', s:'Genealogie der Adelsfamilien', p:'Nachname...', b:'Suche', m:'Suche...', r:'Wappen: ', z:'Quelle: '},
        'fr': {t:'ARMORIAL', s:'Généalogie des familles nobles', p:'Nom...', b:'Chercher', m:'Recherche...', r:'Blason: ', z:'Source: '},
        'es': {t:'ARMORIAL', s:'Genealogía de familias nobles', p:'Apellido...', b:'Buscar', m:'Buscando...', r:'Escudo: ', z:'Fuente: '},
        'pt': {t:'ARMORIAL', s:'Genealogia de famílias nobres', p:'Sobrenome...', b:'Buscar', m:'Buscando...', r:'Brasão: ', z:'Fonte: '},
        'it': {t:'ARMORIALE', s:'Genealogia delle famiglie nobili', p:'Cognome...', b:'Cerca', m:'Ricerca...', r:'Stemma: ', z:'Fonte: '},
        'se': {t:'VAPENBOK', s:'Släktforskning', p:'Efternamn...', b:'Sök', m:'Söker...', r:'Vapen: ', z:'Källa: '},
        'no': {t:'VÅPENBOK', s:'Adelsfamilienes genealogi', p:'Etternavn...', b:'Sök', m:'Søker...', r:'Våpen: ', z:'Kilde: '},
        'he': {t:'ספר הרלדיקה', s:'גנאלוגיה של משפחות אצולה', p:'שם משפحة...', b:'חיפוש', m:'מחפש...', r:'שלט אצולה: ', z:'מקור: '},
        'ar': {t:'شعار النبالة', s:'أنساب العائلات النبيلة', p:'اسم العائلة...', b:'بحث', m:'بحث...', r:'شعار: ', z:'مصدر: '},
        'tr': {t:'ARMORIAL', s:'Soylu Ailelerin Soybilimi', p:'Soyadı...', b:'Ara', m:'Aranıyor...', r:'Arma: ', z:'Kaynak: '},
        'ua': {t:'ГЕРБОВНИК', s:'Генеалогія шляхетських родів', p:'Прізвище...', b:'Пошук', m:'Пошук...', r:'Герб: ', z:'Джерело: '}
    };

    let aktL = 'pl';
    const polskiHerbarz = { "lubiszewski": { h: "Wieniawa", i: "Szlachta wylegitymowana w Królestwie Polskim (Wydawnictwo DiG)" } };

        function zmien(k) { 
        aktL = k; 
        const l = bazy[k] || bazy['pl'];
        document.getElementById('t').innerText = l.t; 
        document.getElementById('s').innerText = l.s;
        document.getElementById('szukaj').placeholder = l.p; 
        document.getElementById('btn-szukaj').innerText = l.b;
        
        // TA LINIA DODAJE ?lang= DO ADRESU BEZ ODŚWIEŻANIA STRONY
        const url = new URL(window.location);
        url.searchParams.set('lang', k);
        window.history.pushState({}, '', url);

        if(document.getElementById('wyniki').innerHTML !== "") herbarzStart();
    }


        async function herbarzStart() {
        const nIn = document.getElementById('szukaj').value.trim().toLowerCase();
        const res = document.getElementById('wyniki');
        const l = bazy[aktL] || bazy['pl'];
        if(!nIn) return;

        res.innerHTML = `<em>${l.m}</em>`;

        try {
            // Pobieranie bazy 3000 nazwisk z pliku JSON
            const response = await fetch('herbarz.json');
            const dane = await response.json();
            
            const wpis = dane[nIn];
            if(wpis) { 
                pobierzZWikipedii(wpis.h, wpis.i); 
            } else { 
                res.innerHTML = `${nIn.toUpperCase()} - ${l.e}`; 
            }
        } catch (e) {
            res.innerHTML = "Błąd ładowania bazy nazwisk.";
        }
    }

    }

    async function pobierzZWikipedii(f, info) {
        const res = document.getElementById('wyniki'); const l = bazy[aktL] || bazy['pl'];
        const nazwa = f.charAt(0).toUpperCase() + f.slice(1);
        const api = `https://wikipedia.org*`;
        try {
            const r = await fetch(api); const d = await r.json(); const p = d.query.pages; const id = Object.keys(p);
            if (id !== "-1" && p[id].thumbnail) {
                res.innerHTML = `<div><h3>${l.r}${nazwa}</h3><img src="${p[id].thumbnail.source}" class="herb-img"><div class="source-info">${l.z}${info}</div></div>`;
                return;
            }
        } catch (e) {}
        res.innerHTML = `${l.r}${nazwa}<br><div class="source-info">${l.z}${info}</div>`;
    }

    // Automatyczne ustawienie języka z adresu URL przy starcie
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        if(params.has('lang')) zmien(params.get('lang'));
    };
</script>
</body>
</html>
