<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Herbarz Szlachecki - herbarz.com</title>
    <style>
        body { background-color: #b59a6d; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; }
        .karta { background-color: #f3e5ab; padding: 50px; border: 2px solid #4a3728; box-shadow: 20px 20px 40px rgba(0,0,0,0.5); text-align: center; width: 750px; }
        h1 { color: #4a3728; font-size: 60px; margin: 0; letter-spacing: 4px; }
        .subtitle { font-style: italic; color: #4a3728; margin: 10px 0 30px 0; border-top: 1px solid #4a3728; display: inline-block; padding-top: 5px; }
        .lang-wrapper { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 35px; }
        .lang-btn { font-size: 30px; cursor: pointer; background: none; border: 1px solid rgba(74, 55, 40, 0.2); padding: 5px; border-radius: 4px; transition: 0.2s; line-height: 1; }
        .lang-btn:hover { transform: scale(1.2); background: rgba(74, 55, 40, 0.1); }
        .search-area { display: flex; justify-content: center; }
        #szukaj { padding: 15px; width: 350px; border: 2px solid #4a3728; background: #fffef0; font-size: 18px; outline: none; }
        #btn-szukaj { padding: 15px 30px; background: #4a3728; color: white; border: none; cursor: pointer; font-size: 18px; font-weight: bold; }
        #wyniki { margin-top: 30px; color: #4a3728; min-height: 100px; font-weight: bold; }
        .herb-item img { max-width: 250px; border: 3px double #4a3728; background: white; padding: 15px; margin-top: 10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="karta">
    <h1 id="t">HERBARZ</h1>
    <div class="subtitle" id="s">Księgi i Genealogia Rodów Szlacheckich</div>
    <div class="lang-wrapper">
        <button class="lang-btn" onclick="zmien('pl')">🇵🇱</button>
        <button class="lang-btn" onclick="zmien('en')">🇬🇧</button>
        <button class="lang-btn" onclick="zmien('de')">🇩🇪</button>
        <button class="lang-btn" onclick="zmien('fr')">🇫🇷</button>
        <button class="lang-btn" onclick="zmien('es')">🇪🇸</button>
        <button class="lang-btn" onclick="zmien('pt')">🇵🇹</button>
        <button class="lang-btn" onclick="zmien('it')">🇮🇹</button>
        <button class="lang-btn" onclick="zmien('se')">🇸🇪</button>
        <button class="lang-btn" onclick="zmien('no')">🇳🇴</button>
        <button class="lang-btn" onclick="zmien('he')">🇮🇱</button>
        <button class="lang-btn" onclick="zmien('ar')">🇸🇦</button>
        <button class="lang-btn" onclick="zmien('tr')">🇹🇷</button>
        <button class="lang-btn" onclick="zmien('ua')">🇺🇦</button>
    </div>
    <div class="search-area">
        <input id="szukaj" type="text" placeholder="Wpisz nazwę herbu...">
        <button id="btn-szukaj" onclick="szukajHerbu()">Szukaj</button>
    </div>
    <div id="wyniki"></div>
</div>

<script>
    const bazy = {
        'pl': {t:'HERBARZ', s:'Księgi i Genealogia Rodów Szlacheckich', p:'Wpisz nazwę herbu...', b:'Szukaj', m:'Szukanie...', n:'Nie znaleziono.'},
        'en': {t:'ARMORIAL', s:'Genealogy of Noble Families', p:'Enter coat of arms...', b:'Search', m:'Searching...', n:'Not found.'},
        'de': {t:'WAPPENROLLE', s:'Genealogie der Adelsfamilien', p:'Wappenname...', b:'Suche', m:'Suche...', n:'Nicht gefunden.'},
        'fr': {t:'ARMORIAL', s:'Généalogie des familles nobles', p:'Nom du blason...', b:'Chercher', m:'Recherche...', n:'Pas trouvé.'},
        'es': {t:'ARMORIAL', s:'Genealogía de familias nobles', p:'Nombre del escudo...', b:'Buscar', m:'Buscando...', n:'No encontrado.'},
        'pt': {t:'ARMORIAL', s:'Genealogia de famílias nobres', p:'Nome do brasão...', b:'Buscar', m:'Procurando...', n:'Não encontrado.'},
        'it': {t:'ARMORIALE', s:'Genealogia delle famiglie nobili', p:'Nome dello stemma...', b:'Cerca', m:'Ricerca...', n:'Non trovato.'},
        'se': {t:'VAPENBOK', s:'Adelsfamiljers genealogi', p:'Vapennamn...', b:'Sök', m:'Söker...', n:'Hittades inte.'},
        'no': {t:'VÅPENBOK', s:'Adelsfamilienes genealogi', p:'Våpennavn...', b:'Søk', m:'Söker...', n:'Ikke funnet.'},
        'he': {t:'ספר הרלdiקה', s:'גנאלוגיה של משפחות אצולה', p:'שם השלט...', b:'חיפusz', m:'מחפש...', n:'לא נמצא.'},
        'ar': {t:'شعار النبالة', s:'أنساب العائلات النبيلة', p:'اسم الشعار...', b:'بحث', m:'جارٍ البحث...', n:'لم يتم العثور.'},
        'tr': {t:'ARMORIAL', s:'Soylu Ailelerin Soybilimi', p:'Arma adı...', b:'Ara', m:'Aranıyor...', n:'Bulunamadı.'},
        'ua': {t:'ГЕРБOVNIK', s:'Genezaloia szlachtetskych rodów', p:'Nazwa gerba...', b:'Poshuk', m:'Poshuk...', n:'Nie znajdeno.'}
    };

    let aktL = 'pl';
    function zmien(k) { aktL = k; const l = bazy[k]; document.getElementById('t').innerText = l.t; document.getElementById('s').innerText = l.s; document.getElementById('szukaj').placeholder = l.p; document.getElementById('btn-szukaj').innerText = l.b; }

    async function szukajHerbu() {
        const q = document.getElementById('szukaj').value.trim();
        const res = document.getElementById('wyniki');
        if(!q) return;
        res.innerHTML = `<em>${bazy[aktL].m}</em>`;
        
        const nazwa = q.charAt(0).toUpperCase() + q.slice(1);
        // Szersza lista terminów do sprawdzenia
        const terminy = [
            `Herb_${nazwa}`,
            `${nazwa}_(herb_szlachecki)`,
            nazwa,
            `${nazwa}_coat_of_arms`
        ];
        
        for (let t of terminy) {
            // Najpierw szukamy miniaturki (thumbnail)
            let api = `https://wikipedia.org{t}&prop=pageimages&format=json&pithumbsize=500&origin=*`;
            try {
                const r = await fetch(api);
                const d = await r.json();
                const p = d.query.pages;
                const id = Object.keys(p);
                
                if (id !== "-1" && p[id].thumbnail) {
                    res.innerHTML = `<div class="herb-item"><h3>${nazwa}</h3><img src="${p[id].thumbnail.source}"></div>`;
                    return;
                }
                
                // Jeśli nie ma miniaturki, próbujemy pobrać wszystkie obrazy z tej strony
                let apiImages = `https://wikipedia.org{t}&prop=images&format=json&origin=*`;
                const rImg = await fetch(apiImages);
                const dImg = await rImg.json();
                const pImg = dImg.query.pages;
                const idImg = Object.keys(pImg);
                
                if (idImg !== "-1" && pImg[idImg].images) {
                    // Szukamy pliku, który ma "Herb" lub "Coat" w nazwie
                    const heraldicImg = pImg[idImg].images.find(img => 
                        img.title.toLowerCase().includes('herb') || 
                        img.title.toLowerCase().includes('coat') ||
                        img.title.toLowerCase().includes('brasao')
                    );
                    
                    if (heraldicImg) {
                        const fileTitle = heraldicImg.title;
                        let apiFile = `https://wikipedia.org{fileTitle}&prop=imageinfo&iiprop=url&iiurlwidth=500&format=json&origin=*`;
                        const rFile = await fetch(apiFile);
                        const dFile = await rFile.json();
                        const pFile = dFile.query.pages;
                        const idFile = Object.keys(pFile);
                        const finalUrl = pFile[idFile].imageinfo[0].thumburl;
                        
                        res.innerHTML = `<div class="herb-item"><h3>${nazwa}</h3><img src="${finalUrl}"></div>`;
                        return;
                    }
                }
            } catch (e) { console.error(e); }
        }
        res.innerHTML = `${bazy[aktL].n} (${nazwa})`;
    }
</script>
</body>
</html>
