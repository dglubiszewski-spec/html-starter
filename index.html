<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herbarz Szlachecki - herbarz.com</title>
    <style>
        body { background-color: #b59a6d; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; }
        .karta { 
            background-color: #f3e5ab; padding: 50px; border: 2px solid #4a3728; 
            box-shadow: 20px 20px 40px rgba(0,0,0,0.5); text-align: center; width: 750px; 
            border-radius: 8px; position: relative;
        }
        h1 { color: #4a3728; font-size: 60px; margin: 0; letter-spacing: 4px; font-weight: bold; }
        .subtitle { font-style: italic; color: #4a3728; margin: 10px 0 30px 0; border-top: 1px solid #4a3728; display: inline-block; padding-top: 5px; font-size: 18px; }
        
        .lang-wrapper { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 35px; }
        .lang-btn { font-size: 30px; cursor: pointer; background: none; border: 1px solid rgba(74, 55, 40, 0.2); padding: 5px; border-radius: 4px; transition: 0.2s; line-height: 1; outline: none; }
        .lang-btn:hover { transform: scale(1.25); background: rgba(74, 55, 40, 0.1); border-color: #4a3728; }
        
        .search-area { display: flex; justify-content: center; }
        #szukaj { padding: 15px; width: 350px; border: 2px solid #4a3728; background: #fffef0; font-size: 18px; outline: none; border-radius: 4px 0 0 4px; }
        #btn-szukaj { padding: 15px 30px; background: #4a3728; color: white; border: none; cursor: pointer; font-size: 18px; font-weight: bold; border-radius: 0 4px 4px 0; transition: 0.3s; }
        #btn-szukaj:hover { background: #634a36; }
        
        #wyniki { margin-top: 30px; color: #4a3728; min-height: 120px; font-weight: bold; font-size: 20px; }
        .herb-item { animation: fadeIn 0.8s; }
        .herb-item img { max-width: 250px; border: 4px double #4a3728; background: white; padding: 15px; margin: 15px 0; box-shadow: 10px 10px 20px rgba(0,0,0,0.2); }
        .source-info { font-size: 14px; font-weight: normal; margin-top: 20px; border-top: 1px dashed #4a3728; padding-top: 10px; color: #555; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="karta">
    <h1 id="t">HERBARZ</h1>
    <div class="subtitle" id="s">Księgi i Genealogia Rodów Szlacheckich</div>

    <div class="lang-wrapper">
        <button class="lang-btn" onclick="zmien('pl')">🇵🇱</button>
        <button class="lang-btn" onclick="zmien('en')">🇬🇧</button>
        <button class="lang-btn" onclick="zmien('de')">🇩🇪</button>
        <button class="lang-btn" onclick="zmien('fr')">🇫🇷</button>
        <button class="lang-btn" onclick="zmien('es')">🇪🇸</button>
        <button class="lang-btn" onclick="zmien('pt')">🇵🇹</button>
        <button class="lang-btn" onclick="zmien('it')">🇮🇹</button>
        <button class="lang-btn" onclick="zmien('se')">🇸🇪</button>
        <button class="lang-btn" onclick="zmien('no')">🇳🇴</button>
        <button class="lang-btn" onclick="zmien('he')">🇮🇱</button>
        <button class="lang-btn" onclick="zmien('ar')">🇸🇦</button>
        <button class="lang-btn" onclick="zmien('tr')">🇹🇷</button>
        <button class="lang-btn" onclick="zmien('ua')">🇺🇦</button>
    </div>

    <div class="search-area">
        <input id="szukaj" type="text" placeholder="Wpisz nazwisko...">
        <button id="btn-szukaj" onclick="herbarzStart()">Szukaj</button>
    </div>

    <div id="wyniki"></div>
</div>

<script>
    const polskiHerbarz = {
        "lubiszewski": { herb: "Wieniawa", info: "Szlachta wylegitymowana w Królestwie Polskim (Wydawnictwo DiG)" },
        "mickiewicz": { herb: "Poraj", info: "Herbarz Polski Kaspra Niesieckiego" },
        "poniatowski": { herb: "Ciołek", info: "Herbarz Polski Adama Bonieckiego" }
    };

    const bazy = {
        'pl': {t:'HERBARZ', s:'Księgi i Genealogia Rodów Szlacheckich', p:'Wpisz nazwisko...', b:'Szukaj', m:'Szukanie...', r:'Zidentyfikowano herb: ', z:'Źródło: '},
        'en': {t:'ARMORIAL', s:'Genealogy of Noble Families', p:'Enter surname...', b:'Search', m:'Searching...', r:'Identified coat of arms: ', z:'Source: '},
        'de': {t:'WAPPENROLLE', s:'Genealogie der Adelsfamilien', p:'Nachname...', b:'Suche', m:'Suche...', r:'Wappen identifiziert: ', n:'Kein Bild gefunden.', z:'Quelle: '},
        'fr': {t:'ARMORIAL', s:'Généalogie des familles nobles', p:'Nom...', b:'Chercher', m:'Recherche...', r:'Blason identifié : ', z:'Source : '},
        'es': {t:'ARMORIAL', s:'Genealogía de familias nobles', p:'Apellido...', b:'Buscar', m:'Buscando...', r:'Escudo identificado: ', z:'Fuente: '},
        'pt': {t:'ARMORIAL', s:'Genealogia de famílias nobres', p:'Sobrenome...', b:'Buscar', m:'Procurando...', r:'Brasão identificado: ', z:'Fonte: '},
        'it': {t:'ARMORIALE', s:'Genealogia delle famiglie nobili', p:'Cognome...', b:'Cerca', m:'Ricerca...', r:'Stemma identificato: ', z:'Fonte: '},
        'se': {t:'VAPENBOK', s:'Släktforskning för adelsfamiljer', p:'Efternamn...', b:'Sök', m:'Söker...', r:'Identifierat vapen: ', z:'Källa: '},
        'no': {t:'VÅPENBOK', s:'Adelsfamilienes genealogi', p:'Etternavn...', b:'Sök', m:'Søker...', r:'Identifisert våpen: ', z:'Kilde: '},
        'he': {t:'ספר הרלדיקה', s:'גנאלוגיה של משפחות אצולה', p:'שם משפחה...', b:'חיפוש', m:'מחפש...', r:'זוהה שלט אצולה: ', z:'מקור: '},
        'ar': {t:'شعار النبالة', s:'أنساب العائلات النبيلة', p:'اسم العائلة...', b:'بحث', m:'بحث...', r:'تم تحديد الشعار: ', z:'مصدر: '},
        'tr': {t:'ARMORIAL', s:'Soylu Ailelerin Soybilimi', p:'Soyadı...', b:'Ara', m:'Aranıyor...', r:'Arma tanımlandı: ', z:'Kaynak: '},
        'ua': {t:'ГЕРБОВНИК', s:'Генеалогія шляхетських родів', p:'Введіть прізвище...', b:'Пошук', m:'Пошук...', r:'Ідентифіковано герб: ', z:'Джерело: '}
    };

    let aktL = 'pl';
    function zmien(k) { 
        aktL = k; const l = bazy[k] || bazy['pl'];
        document.getElementById('t').innerText = l.t; document.getElementById('s').innerText = l.s;
        document.getElementById('szukaj').placeholder = l.p; document.getElementById('btn-szukaj').innerText = l.b;
    }

    function herbarzStart() {
        const nInput = document.getElementById('szukaj').value.trim().toLowerCase();
        const res = document.getElementById('wyniki');
        const l = bazy[aktL] || bazy['pl'];
        if(!nInput) return;

        res.innerHTML = `<em>${l.m}</em>`;
        const wpis = polskiHerbarz[nInput];
        const nazwaHerbu = wpis ? wpis.herb : nInput;
        const zrodloInfo = wpis ? wpis.info : "Archiwa historyczne";
        
        pobierzZWikipedii(nazwaHerbu, zrodloInfo);
    }

    async function pobierzZWikipedii(f, info) {
        const res = document.getElementById('wyniki'); const l = bazy[aktL] || bazy['pl'];
        const nazwa = f.charAt(0).toUpperCase() + f.slice(1);
        const terminy = [`${nazwa}_(herb_szlachecki)`, `Herb_${nazwa}`, nazwa];

        for (let t of terminy) {
            const api = `https://wikipedia.org{t}&prop=pageimages&format=json&pithumbsize=500&origin=*`;
            try {
                const r = await fetch(api); const d = await r.json(); const p = d.query.pages; const id = Object.keys(p);
                if (id !== "-1" && p[id].thumbnail) {
                    res.innerHTML = `<div class="herb-item">
                        <h3>${l.r}${nazwa}</h3>
                        <img src="${p[id].thumbnail.source}">
                        <div class="source-info">${l.z} ${info}</div>
                    </div>`;
                    return;
                }
            } catch (e) {}
        }
        res.innerHTML = `${l.r}${nazwa}<br><div class="source-info">${l.z} ${info}</div>`;
    }
</script>
</body>
</html>
