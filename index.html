<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        /* Swobodne układanie flag */
        .lang-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* To pozwala flagom przechodzić do nowej linii */
            gap: 10px;
            margin: 20px auto;
            max-width: 600px;
        }
        .lang-buttons img {
            width: 40px;
            height: auto;
            cursor: pointer;
            border: 1px solid #ccc;
            transition: transform 0.2s;
        }
        .lang-buttons img:hover { transform: scale(1.1); }

        /* Kontener na herby */
        #wyniki {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .herb-item { text-align: center; width: 150px; }
        .herb-item img { width: 100%; height: auto; border: 1px solid #4a3728; }
    </style>
</head>
<body>

    <div class="lang-buttons">
        <img src="https://flagcdn.com" onclick="zmienJezyk('pl')" alt="PL">
        <img src="https://flagcdn.com" onclick="zmienJezyk('en')" alt="EN">
        <img src="https://flagcdn.com" onclick="zmienJezyk('de')" alt="DE">
        <img src="https://flagcdn.com" onclick="zmienJezyk('fr')" alt="FR">
        <img src="https://flagcdn.com" onclick="zmienJezyk('es')" alt="ES">
        <img src="https://flagcdn.com" onclick="zmienJezyk('pt')" alt="PT">
        <img src="https://flagcdn.com" onclick="zmienJezyk('it')" alt="IT">
        <img src="https://flagcdn.com" onclick="zmienJezyk('se')" alt="SE">
        <img src="https://flagcdn.com" onclick="zmienJezyk('no')" alt="NO">
        <img src="https://flagcdn.com" onclick="zmienJezyk('he')" alt="HE">
        <img src="https://flagcdn.com" onclick="zmienJezyk('ar')" alt="AR">
        <img src="https://flagcdn.com" onclick="zmienJezyk('tr')" alt="TR">
        <img src="https://flagcdn.com" onclick="zmienJezyk('ua')" alt="UA">
    </div>

    <div id="wyniki">
        <!-- Tutaj skrypt wstawi herby -->
    </div>

    <script>
        // SYSTEM TŁUMACZEŃ: Działa na zasadzie przeładowania strony z parametrem ?lang=
        function zmienJezyk(kod) {
            const url = new URL(window.location.href);
            url.searchParams.set('lang', kod);
            window.location.href = url.toString(); 
        }

        // DLACZEGO NIE MA HERBÓW: Skrypt musi znać folder, w którym je trzymasz.
        // Zakładam, że herby są w folderze /img/herby/ i nazywają się tak jak nazwisko.
        function wyswietlHerby(dane) {
            const kontener = document.getElementById('wyniki');
            kontener.innerHTML = ''; // Czyścimy poprzednie wyniki

            dane.forEach(herb => {
                const div = document.createElement('div');
                div.className = 'herb-item';
                // TUTAJ POPRAWIŁEM ŚCIEŻKĘ DO OBRAZKA:
                div.innerHTML = `
                    <img src="img/herby/${herb.plik}.jpg" onerror="this.src='img/brak_herbu.jpg'" alt="${herb.nazwa}">
                    <p>${herb.nazwa}</p>
                `;
                kontener.appendChild(div);
            });
        }
    </script>
</body>
</html>
