<!DOCTYPE html>
<html lang="pl" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herbarz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="lang-switcher">
      <button onclick="zmienJezyk('pl')">PL</button>
      <button onclick="zmienJezyk('en')">EN</button>
      <button onclick="zmienJezyk('de')">DE</button>
      <button onclick="zmienJezyk('fr')">FR</button>
      <button onclick="zmienJezyk('es')">ES</button>
      <button onclick="zmienJezyk('pt')">PT</button>
      <button onclick="zmienJezyk('it')">IT</button>
      <button onclick="zmienJezyk('se')">SE</button>
      <button onclick="zmienJezyk('no')">NO</button>
      <button onclick="zmienJezyk('he')">HE</button>
      <button onclick="zmienJezyk('ar')">AR</button>
    </div>

    <h1 id="tytul">Herbarz</h1>
    <p class="subtitle" id="podtytul">Herby i genealogia</p>

    <div class="search-box">
      <input type="text" id="search" placeholder="Szukaj herbu lub nazwiska...">
    </div>

    <div id="items-list" class="items-grid">
      <!-- Tu będą herby i opisy rodów -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
