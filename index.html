<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Herbarz Szlachecki - herbarz.com</title>
    <style>
        body { background-color: #b59a6d; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: serif; }
        .karta {
            background-color: #f3e5ab;
            padding: 50px;
            border: 2px solid #4a3728;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.3);
            text-align: center;
            min-width: 600px;
            position: relative;
        }
        h1 { color: #4a3728; font-size: 60px; margin: 0; }
        .subtitle { font-style: italic; color: #4a3728; margin-bottom: 30px; border-bottom: 1px solid #4a3728; display: inline-block; }
        
        .lang-buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .lang-buttons img { width: 40px; cursor: pointer; border: 1px solid #ccc; transition: 0.2s; }
        .lang-buttons img:hover { transform: scale(1.2); }

        .search-box { display: flex; justify-content: center; }
        #szukaj { padding: 15px; width: 300px; border: 2px solid #4a3728; font-size: 18px; }
        #btn { padding: 15px 30px; background: #4a3728; color: white; border: none; cursor: pointer; font-weight: bold; }

        #wyniki { margin-top: 30px; display: flex; flex-direction: column; align-items: center; }
        .herb-container img { max-width: 200px; border: 1px solid #4a3728; background: white; padding: 10px; }
    </style>
</head>
<body>

<div class="karta">
    <h1>HERBARZ</h1>
    <div class="subtitle">Księgi i Genealogia Rodów Szlacheckich</div>

    <div class="lang-buttons">
        <img src="https://flagcdn.com" onclick="zmienJezyk('pl')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('en')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('de')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('fr')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('es')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('pt')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('it')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('se')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('no')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('he')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('ar')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('tr')">
        <img src="https://flagcdn.com" onclick="zmienJezyk('ua')">
    </div>

    <div class="search-box">
        <input id="szukaj" type="text" placeholder="Wpisz nazwisko...">
        <button id="btn" onclick="pobierzHerb()">Szukaj</button>
    </div>

    <div id="wyniki"></div>
</div>

<script>
    function zmienJezyk(kod) {
        window.location.search = "?lang=" + kod;
    }

    async function pobierzHerb() {
        const nazwisko = document.getElementById('szukaj').value;
        const kontener = document.getElementById('wyniki');
        kontener.innerHTML = "Szukam...";

        // API Wikipedii do szukania obrazka herbu
        const api = `https://wikipedia.org{nazwisko}&prop=pageimages&format=json&pithumbsize=400&origin=*`;

        try {
            const res = await fetch(api);
            const data = await res.json();
            const pages = data.query.pages;
            const pageId = Object.keys(pages)[0];

            if (pageId !== "-1" && pages[pageId].thumbnail) {
                const imgUrl = pages[pageId].thumbnail.source;
                kontener.innerHTML = `<div class="herb-container"><h3>Herb ${nazwisko}</h3><img src="${imgUrl}"></div>`;
            } else {
                kontener.innerHTML = "Nie znaleziono herbu dla tego nazwiska.";
            }
        } catch (e) {
            kontener.innerHTML = "Błąd połączenia z bazą herbów.";
        }
    }
</script>

</body>
</html>
