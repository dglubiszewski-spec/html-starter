<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herbarz</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    .lang-buttons button { margin: 2px; padding: 5px 10px; cursor: pointer; border: 1px solid #ccc; }
    #szukaj { padding: 8px; width: 300px; margin: 20px 5px; }
    #przyciskSzukaj { padding: 8px 15px; cursor: pointer; background-color: #f0f0f0; border: 1px solid #ccc; }
    #wyniki { margin-top: 30px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; }
    .herb { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
    [dir="rtl"] { direction: rtl; }
    [dir="rtl"] #wyniki { text-align: right; }
  </style>
</head>
<body>

  <h1 id="tytul">Herbarz</h1>
  <p id="podtytul">Herby i genealogia</p>

  <div>
    <input id="szukaj" type="text" placeholder="Szukaj herbu lub nazwiska...">
    <button id="przyciskSzukaj" onclick="wykonajSzukanie()">Szukaj</button>
  </div>

  <div class="lang-buttons">
    <button onclick="zmienJezyk('pl')">PL</button>
    <button onclick="zmienJezyk('en')">EN</button>
    <button onclick="zmienJezyk('de')">DE</button>
    <button onclick="zmienJezyk('fr')">FR</button>
    <button onclick="zmienJezyk('es')">ES</button>
    <button onclick="zmienJezyk('pt')">PT</button>
    <button onclick="zmienJezyk('it')">IT</button>
    <button onclick="zmienJezyk('se')">SE</button>
    <button onclick="zmienJezyk('no')">NO</button>
    <button onclick="zmienJezyk('he')">HE</button>
    <button onclick="zmienJezyk('ar')">AR</button>
    <button onclick="zmienJezyk('tr')">TR</button>
  </div>

  <div id="wyniki"></div>

<script>
const tlumaczenia = {
  pl: { tytul: "Herbarz", podtytul: "Herby i genealogia", szukaj: "Szukaj herbu lub nazwiska...", przycisk: "Szukaj", brak: "Nie znaleziono" },
  en: { tytul: "Armorial", podtytul: "Coats of arms and genealogy", szukaj: "Search coat of arms...", przycisk: "Search", brak: "No results found" },
  de: { tytul: "Wappenbuch", podtytul: "Wappen und Genealogie", szukaj: "Wappen suchen...", przycisk: "Suchen", brak: "Keine Ergebnisse" },
  fr: { tytul: "Armorial", podtytul: "Armoiries et généalogie", szukaj: "Rechercher...", przycisk: "Chercher", brak: "Aucun résultat" },
  es: { tytul: "Heráldica", podtytul: "Escudos y genealogía", szukaj: "Buscar...", przycisk: "Buscar", brak: "Sin resultados" },
  pt: { tytul: "Armorial", podtytul: "Brasões e genealogia", szukaj: "Pesquisar...", przycisk: "Pesquisar", brak: "Nenhum resultado" },
  it: { tytul: "Stemmario", podtytul: "Stemmi e genealogia", szukaj: "Cerca...", przycisk: "Cerca", brak: "Nessun risultato" },
  se: { tytul: "Vapenbok", podtytul: "Vapen och genealogi", szukaj: "Sök...", przycisk: "Sök", brak: "Inga rezultat" },
  no: { tytul: "Våpenbok", podtytul: "Våpen og slektsforskning", szukaj: "Sök...", przycisk: "Sök", brak: "Ingen resultater" },
  he: { tytul: "ספר השלטים", podtytul: "שלטי אצולה וגנאלוגia", szukaj: "חפש...", przycisk: "חפש", brak: "לא נמצאו תוצאות" },
  ar: { tytul: "كتاب شعارات النبالة", podtytul: "شعارات النبالة وعلم الأنساب", szukaj: "ابحث...", przycisk: "بحث", brak: "لا توjed نتائج" },
  tr: { tytul: "Arma Kitabı", podtytul: "Armalar ve soy ağacı", szukaj: "Ara...", przycisk: "Ara", brak: "Sonuç bulunamadı" }
};

const bazaHerbow = [
  { nazwisko: "Lubiszewski", herb: "Lubicz", opis: "W polu błękitnym podkowa srebrna..." },
  { nazwisko: "Kowalski", herb: "Korab", opis: "W polu czerwonym korab złoty..." },
  { nazwisko: "Nowak", herb: "Nałęcz", opis: "W polu czerwonym chusta srebrna..." }
];

let aktywnyJezyk = 'pl';

function zmienJezyk(kodJezyka) {
  aktywnyJezyk = kodJezyka;
  const dane = tlumaczenia[kodJezyka]; // Pobranie paczki językowej
  
  if (!dane) return; // Zabezpieczenie przed błędem

  // Podmiana tekstów
  document.getElementById('tytul').innerText = dane.tytul;
  document.getElementById('podtytul').innerText = dane.podtytul;
  document.getElementById('szukaj').placeholder = dane.szukaj;
  document.getElementById('przyciskSzukaj').innerText = dane.przycisk;
  
  // Kierunek tekstu
  document.documentElement.lang = kodJezyka;
  document.documentElement.dir = (kodJezyka === 'he' || kodJezyka === 'ar') ? 'rtl' : 'ltr';
  
  // Tytuł strony w przeglądarce
  document.title = dane.tytul;
}

function wykonajSzukanie() {
  const poleSzukaj = document.getElementById('szukaj');
  const fraza = poleSzukaj.value.toLowerCase().trim();
  const kontener = document.getElementById('wyniki');
  
  kontener.innerHTML = '';
  if (fraza === '') return;

  const wyniki = bazaHerbow.filter(h =>
    h.nazwisko.toLowerCase().includes(fraza) ||
    h.herb.toLowerCase().includes(fraza)
  );

  const t = tlumaczenia[aktywnyJezyk];

  if (wyniki.length === 0) {
    kontener.innerHTML = `<p>${t.brak}: "${fraza}"</p>`;
    return;
  }

  wyniki.forEach(h => {
    kontener.innerHTML += `
      <div class="herb">
        <h3>${h.nazwisko} - ${h.herb}</h3>
        <p>${h.opis}</p>
      </div>
    `;
  });
}

// Obsługa Entera
document.getElementById('szukaj').onkeyup = function(e) {
  if (e.key === "Enter") wykonajSzukanie();
};

// Startowa inicjalizacja
zmienJezyk('pl');
</script>

</body>
</html>
