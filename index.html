<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Herbarz Szlachecki - Aplikacja</title>
  
  <!-- Miejsce na kod reklam Google AdSense -->
  <!-- <script async src="https://googlesyndication.com" crossorigin="anonymous"></script> -->

  <!-- Meta tagi dla Aplikacji (PWA) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* STYL PERGAMINOWEJ APKI */
    body { 
      font-family: 'Georgia', serif; 
      text-align: center; 
      margin: 0; padding: 10px;
      background: #fdf5e6 url('https://transparenttextures.com'); 
      color: #3e2723;
      -webkit-tap-highlight-color: transparent;
    }

    header { padding: 20px 0; position: sticky; top: 0; background: rgba(253, 245, 230, 0.9); z-index: 100; border-bottom: 2px solid #d4af37; }
    h1 { font-variant: small-caps; font-size: 2.5em; margin: 0; color: #5d4037; text-shadow: 1px 1px 0px #d4af37; }

    .search-box { 
      padding: 15px; background: #fffde7; border: 2px solid #d4af37; 
      border-radius: 50px; margin: 20px auto; max-width: 500px;
      display: flex; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    #szukaj { 
      flex: 1; border: none; background: transparent; padding: 10px; 
      font-size: 18px; outline: none; font-style: italic;
    }
    #przyciskSzukaj { 
      background: #d4af37; color: white; border: none; 
      padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer;
    }

    .lang-buttons { overflow-x: auto; white-space: nowrap; padding: 10px; -webkit-overflow-scrolling: touch; }
    .lang-buttons button { 
      display: inline-block; margin: 2px; padding: 8px 15px; 
      border: 1px solid #d4af37; background: #fff; border-radius: 20px;
    }

    #wyniki { max-width: 600px; margin: 20px auto; padding-bottom: 100px; }
    
    .herb-card { 
      background: white; border: 3px double #d4af37; 
      margin-bottom: 20px; padding: 15px; border-radius: 15px;
      display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .herb-card img { width: 80px; height: auto; }
    .herb-info { text-align: left; }
    .herb-info h3 { margin: 0; color: #5d4037; font-size: 1.2em; border-bottom: 1px solid #d4af37; }

    /* Reklama na dole */
    .ad-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #eee; border-top: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  </style>
</head>
<body>

<header>
  <h1 id="tytul">Herbarz</h1>
  <p id="podtytul">Aplikacja Genealogiczna</p>
</header>

<div class="search-box">
  <input id="szukaj" type="text" placeholder="Szukaj nazwiska...">
  <button id="przyciskSzukaj" onclick="wykonajSzukanie()">Szukaj</button>
</div>

<div class="lang-buttons">
  <button onclick="zmienJezyk('pl')">PL</button>
  <button onclick="zmienJezyk('en')">EN</button>
  <button onclick="zmienJezyk('de')">DE</button>
  <button onclick="zmienJezyk('fr')">FR</button>
  <button onclick="zmienJezyk('es')">ES</button>
  <button onclick="zmienJezyk('tr')">TR</button>
</div>

<div id="wyniki"></div>

<div class="ad-container">Miejsce na Twoją reklamę Google AdSense</div>

<script>
const tlumaczenia = {
  pl: { tytul: "Herbarz", szukaj: "Szukaj nazwiska...", brak: "Nie znaleziono" },
  en: { tytul: "Armorial", szukaj: "Search surname...", brak: "Not found" }
  // ... tu dodaj resztę języków jak wcześniej
};

const bazaHerbow = [
  { 
    nazwisko: "Lubiszewski", 
    herb: "Wieniawa", 
    obrazek: "https://wikimedia.org",
    opisy: {
      pl: "W polu złotym głowa żubra czarna z pierścieniem złotym w nozdrzach.",
      en: "On a golden field, a black bison head with a golden ring in its nostrils."
    }
  },
  { 
    nazwisko: "Nowak", 
    herb: "Nałęcz", 
    obrazek: "https://wikimedia.org",
    opisy: { pl: "Srebrna chusta na czerwonym polu.", en: "Silver cloth on a red field." }
  }
  // Tu możesz wkleić resztę herbów, które Ci wysłałem wcześniej
];

let aktywnyJezyk = 'pl';

function zmienJezyk(kod) {
  aktywnyJezyk = kod;
  const d = tlumaczenia[kod] || tlumaczenia['pl'];
  document.getElementById('tytul').innerText = d.tytul;
  document.getElementById('szukaj').placeholder = d.szukaj;
  if (document.getElementById('szukaj').value.trim() !== "") wykonajSzukanie();
}

function wykonajSzukanie() {
  const fraza = document.getElementById('szukaj').value.toLowerCase().trim();
  const kontener = document.getElementById('wyniki');
  kontener.innerHTML = '';
  if (fraza === '') return;
  const wyniki = bazaHerbow.filter(h => h.nazwisko.toLowerCase().includes(fraza) || h.herb.toLowerCase().includes(fraza));
  const t = tlumaczenia[aktywnyJezyk] || tlumaczenia['pl'];
  if (wyniki.length === 0) {
    kontener.innerHTML = `<p>${t.brak}: "${fraza}"</p>`;
    return;
  }
  wyniki.forEach(h => {
    const opis = h.opisy[aktywnyJezyk] || h.opisy['pl'];
    kontener.innerHTML += `
      <div class="herb-card">
        <img src="${h.obrazek}" alt="${h.herb}">
        <div class="herb-info">
          <h3>${h.nazwisko} - ${h.herb}</h3>
          <p>${opis}</p>
        </div>
      </div>
    `;
  });
}

document.getElementById('szukaj').onkeyup = (e) => { if (e.key === "Enter") wykonajSzukanie(); };
zmienJezyk('pl');
</script>
</body>
</html>
