<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Herbarz Szlachecki - herbarz.com</title>
    <style>
        body { background-color: #b59a6d; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; }
        .karta { 
            background-color: #f3e5ab; padding: 50px; border: 2px solid #4a3728; 
            box-shadow: 20px 20px 40px rgba(0,0,0,0.5); text-align: center; width: 750px; 
        }
        h1 { color: #4a3728; font-size: 60px; margin: 0; letter-spacing: 4px; }
        .subtitle { font-style: italic; color: #4a3728; margin: 10px 0 30px 0; border-top: 1px solid #4a3728; display: inline-block; padding-top: 5px; }

        .lang-wrapper { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .lang-wrapper img { width: 40px; height: auto; cursor: pointer; border: 1px solid #999; transition: 0.2s; }
        .lang-wrapper img:hover { transform: scale(1.2); }

        .search-area { display: flex; justify-content: center; }
        #szukaj { padding: 15px; width: 350px; border: 2px solid #4a3728; background: #fffef0; font-size: 18px; outline: none; }
        #btn-szukaj { padding: 15px 30px; background: #4a3728; color: white; border: none; cursor: pointer; font-size: 18px; font-weight: bold; }

        #wyniki { margin-top: 30px; color: #4a3728; min-height: 100px; }
        .herb-item img { max-width: 200px; border: 2px solid #4a3728; background: white; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="karta">
    <h1 id="t">HERBARZ</h1>
    <div class="subtitle" id="s">Księgi i Genealogia Rodów Szlacheckich</div>

    <div class="lang-wrapper">
        <img src="https://flagcdn.com" onclick="zmien('pl')">
        <img src="https://flagcdn.com" onclick="zmien('en')">
        <img src="https://flagcdn.com" onclick="zmien('de')">
        <img src="https://flagcdn.com" onclick="zmien('fr')">
        <img src="https://flagcdn.com" onclick="zmien('es')">
        <img src="https://flagcdn.com" onclick="zmien('pt')">
        <img src="https://flagcdn.com" onclick="zmien('it')">
        <img src="https://flagcdn.com" onclick="zmien('se')">
        <img src="https://flagcdn.com" onclick="zmien('no')">
        <img src="https://flagcdn.com" onclick="zmien('he')">
        <img src="https://flagcdn.com" onclick="zmien('ar')">
        <img src="https://flagcdn.com" onclick="zmien('tr')">
        <img src="https://flagcdn.com" onclick="zmien('ua')">
    </div>

    <div class="search-area">
        <input id="szukaj" type="text" placeholder="Wpisz nazwisko...">
        <button id="btn-szukaj" onclick="szukajHerbu()">Szukaj</button>
    </div>

    <div id="wyniki"></div>
</div>

<script>
    const bazy = {
        'pl': {t:'HERBARZ', s:'Księgi i Genealogia Rodów Szlacheckich', p:'Wpisz nazwisko...', b:'Szukaj', err:'Nie znaleziono.'},
        'en': {t:'ARMORIAL', s:'Genealogy of Noble Families', p:'Enter surname...', b:'Search', err:'Not found.'},
        'de': {t:'WAPPENROLLE', s:'Genealogie der Adelsfamilien', p:'Nachname...', b:'Suche', err:'Nicht gefunden.'},
        'fr': {t:'ARMORIAL', s:'Généalogie des familles nobles', p:'Entrez le nom...', b:'Chercher', err:'Pas trouvé.'},
        'es': {t:'ARMORIAL', s:'Genealogía de familias nobles', p:'Apellido...', b:'Buscar', err:'No encontrado.'},
        'pt': {t:'ARMORIAL', s:'Genealogia de famílias nobres', p:'Sobrenome...', b:'Buscar', err:'Não encontrado.'},
        'it': {t:'ARMORIALE', s:'Genealogia delle famiglie nobili', p:'Cognome...', b:'Cerca', err:'Non trovato.'},
        'se': {t:'VAPENBOK', s:'Adelsfamiljers genealogi', p:'Efternamn...', b:'Sök', err:'Hittades inte.'},
        'no': {t:'VÅPENBOK', s:'Adelsfamilienes genealogi', p:'Etternavn...', b:'Søk', err:'Ikke funnet.'},
        'he': {t:'ספר הרלדיקה', s:'גנאלוגיה של משפחות אצולה', p:'הזן שם משפחה...', b:'חיפוש', err:'לא נמצא.'},
        'ar': {t:'شعار النبالة', s:'أنساب العائلات النبيلة', p:'أدخل اسم العائلة...', b:'بحث', err:'لم يتم العثور على.'},
        'tr': {t:'ARMORIAL', s:'Soylu Ailelerin Soybilimi', p:'Soyadı girin...', b:'Ara', err:'Bulunamadı.'},
        'ua': {t:'ГЕРБОВНИК', s:'Генеалогія шляхетських родів', p:'Введіть прізвище...', b:'Пошук', err:'Не знайдено.'}
    };

    function zmien(k) {
        const l = bazy[k];
        document.getElementById('t').innerText = l.t;
        document.getElementById('s').innerText = l.s;
        document.getElementById('szukaj').placeholder = l.p;
        document.getElementById('btn-szukaj').innerText = l.b;
        window.history.pushState({}, '', '?lang='+k);
    }

    async function szukajHerbu() {
        const q = document.getElementById('szukaj').value;
        const res = document.getElementById('wyniki');
        if(!q) return;
        res.innerHTML = "Przeszukiwanie ksiąg...";

        // Próbujemy znaleźć herb z dopiskiem (najczęstszy format w bazie)
        const nazwa = q.charAt(0).toUpperCase() + q.slice(1);
        const api = `https://wikipedia.org{nazwa}&prop=pageimages&format=json&pithumbsize=400&origin=*`;

        try {
            const r = await fetch(api);
            const d = await r.json();
            const p = d.query.pages;
            const id = Object.keys(p)[0];

            if (id !== "-1" && p[id].thumbnail) {
                res.innerHTML = `<div class="herb-item"><h3>${nazwa}</h3><img src="${p[id].thumbnail.source}"></div>`;
            } else {
                res.innerHTML = "Brak herbu w bazie dla: " + nazwa;
            }
        } catch (e) {
            res.innerHTML = "Błąd połączenia z serwerem.";
        }
    }
</script>
</body>
</html>
